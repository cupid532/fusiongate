name: fusiongate

services:
  fusiongate:
    build:
      context: ${FUSIONGATE_SOURCE_PATH}
      dockerfile: Dockerfile
    image: fusiongate:production
    restart: unless-stopped
    env_file:
      - ${FUSIONGATE_ENV_FILE}
    environment:
      FUSIONGATE_ADDR: 0.0.0.0:8787
      FUSIONGATE_DATA_DIR: /data
      FUSIONGATE_MASTER_KEY_FILE: /run/secrets/fusiongate_master_key
      FUSIONGATE_ADMIN_PASSWORD_FILE: /run/secrets/fusiongate_admin_password
    expose:
      - "8787"
    volumes:
      - ${FUSIONGATE_DATA_PATH:-../../data}:/data
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    secrets:
      - fusiongate_master_key
      - fusiongate_admin_password
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      fusiongate:
        condition: service_healthy
    environment:
      FUSIONGATE_DOMAIN: ${FUSIONGATE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ${FUSIONGATE_CADDYFILE_PATH}:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_PATH:-../../caddy-data}:/data
      - ${CADDY_CONFIG_PATH:-../../caddy-config}:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  internal:
    driver: bridge

secrets:
  fusiongate_master_key:
    file: ${FUSIONGATE_MASTER_KEY_PATH}
  fusiongate_admin_password:
    file: ${FUSIONGATE_ADMIN_PASSWORD_PATH}
